<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0c121c; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        .controls { background: #1a2230; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        button { background: #2c3e50; border: none; color: white; padding: 8px 15px; cursor: pointer; border-radius: 3px; }
        button.active { background: #c0392b; }
        
        #player-container { flex-grow: 1; background: black; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; }
        
        .ad-container { width: 100%; height: 50px; background: #000; display: flex; justify-content: center; align-items: center; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div class="controls">
    <button onclick="loadStream('https://s3.us-east-2.amazonaws.com/cdnr300/live/stream/index.m3u8', this)">بث 1</button>
    <button onclick="loadStream('https://2.simoplay.com/my-hls/h9asfma10d5.m3u8', this)">بث 3</button>
    <button onclick="loadStream('https://2.simoplay.com/my-hls/0wo68p0w54v.m3u8', this)">بث 4</button>
    <button onclick="loadStream('https://sh.kooraa36.cfd/endroom1.m3u8', this)">بث 5</button>
    <button onclick="loadStream('https://1.simoplay.com/my-hls/b7xk35l5sku.m3u8', this)">بث 6</button>
</div>

<div id="player-container">
    <video id="video" controls autoplay muted></video>
</div>

<div class="ad-container">
    <script>atOptions = {'key' : '10c5b600c97b594e544f498f9b4770d0', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {}};</script>
    <script src="https://behavecurlescalator.com/10c5b600c97b594e544f498f9b4770d0/invoke.js"></script>
</div>

<script>
    var video = document.getElementById('video');
    var hls = new Hls();
    // رابط الـ Worker الخاص بك
    var workerUrl = "https://withered-mud-4e52.koora-live.workers.dev/?url=";

    function loadStream(streamUrl, btn) {
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (hls) hls.destroy();

        // نقوم بدمج الرابط مع الـ Worker لتنظيفه
        var finalUrl = workerUrl + encodeURIComponent(streamUrl);

        hls = new Hls();
        hls.loadSource(finalUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    }

    // تشغيل البث الأول تلقائياً
    window.onload = () => loadStream('https://s3.us-east-2.amazonaws.com/cdnr300/live/stream/index.m3u8', document.querySelector('button'));
</script>
<script src="ad-manager.js"></script>
</body>
