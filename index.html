<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #0c121c; color: white; font-family: sans-serif; }
        .controls { background: #1a2230; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        button { background: #2c3e50; border: none; color: white; padding: 8px 15px; cursor: pointer; border-radius: 3px; }
        button:hover { background: #34495e; }
        button.active { background: #c0392b; }
        #player-container { width: 100%; height: 70vh; background: black; display: flex; justify-content: center; align-items: center; }
        video, iframe { width: 100%; height: 100%; border: none; }
        .footer { padding: 15px; text-align: center; background: #1a2230; border-top: 2px solid #c0392b; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div class="controls" id="btn-group">
    <button onclick="loadStream(0, 'https://24.1yalla-shoot.space/albaplayer/live2/?serv=2&amp;auth=kreem0090', true)">بث 1</button>
    <button onclick="loadStream(1, 'https://p1.paanda-hd.com/albaplayer/extra-1/?serv=2&amp;auth=kreem0090', true)">بث 2</button>
    <button onclick="loadStream(2, 'https://3.simoplay.com/my-hls/0wo68p0w54v.m3u8', false)">بث 3</button>
    <button onclick="loadStream(3, 'https://2.simoplay.com/my-hls/0wo68p0w54v.m3u8', false)">بث 4</button>
    <button onclick="loadStream(4, 'https://sh.kooraa36.cfd/endroom1.m3u8', false)">بث 5</button>
    <button onclick="loadStream(5, 'https://1.simoplay.com/my-hls/b7xk35l5sku.m3u8', false)">بث 6</button>
    <button onclick="location.reload()">تحديث</button>
</div>

<div id="player-container">
    <video id="video" controls autoplay muted></video>
</div>

<div class="footer">
    تنبيه: إذا توقف البث قم بالضغط على زر التحديث أو إختار مشغلاً آخر في الأعلى.
</div>

<script>
    var container = document.getElementById('player-container');
    var hls = new Hls();

    function loadStream(index, url, isIframe) {
        document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('button')[index].classList.add('active');

        if (hls) hls.destroy();

        if (isIframe) {
            container.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
        } else {
            container.innerHTML = `<video id="video" controls autoplay muted></video>`;
            var video = document.getElementById('video');
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }
    }

    // تشغيل البث الأول تلقائياً عند فتح الصفحة
    window.onload = function() {
        loadStream(0, 'https://24.1yalla-shoot.space/albaplayer/live2/', false);
    };
</script>


    <script src="ad-manager.js"></script>
</body>
</html>
